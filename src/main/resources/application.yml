spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inviteque}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:rishi2001}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"

server:
  port: ${PORT:8080}

# Application Specific Properties
app:
  jwt:
    # Generate using: openssl rand -base64 32
    secret: ${JWT_SECRET:NmU0ZTM2ZTNmMGNmZGRiYTk4YjU5YmU0ZGI3Y2RjZGU1MGRjZTQ3ZDUwZTcwYmYwOTAzYjQ0ZWU0NmI4NmI0MQ==}
    expiration-ms: 86400000 # 24 Hours
    refresh-expiration-ms: 604800000 # 7 Days

razorpay:
  key-id: ${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://www.invitique.com}

logging:
  level:
    org.springframework.security: INFO
    com.invitique: DEBUG
