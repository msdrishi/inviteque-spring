spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inviteque}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:rishi2001}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
# WhatsApp API Configuration (Meta Cloud API / log mock fallback)
whatsapp:
  api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v19.0}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  access-token: ${WHATSAPP_ACCESS_TOKEN:}
  template-name: ${WHATSAPP_TEMPLATE_NAME:}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

# Application Specific Properties
app:
  jwt:
    # Generate using: openssl rand -base64 32
    secret: ${JWT_SECRET:NmU0ZTM2ZTNmMGNmZGRiYTk4YjU5YmU0ZGI3Y2RjZGU1MGRjZTQ3ZDUwZTcwYmYwOTAzYjQ0ZWU0NmI4NmI0MQ==}
    expiration-ms: 2592000000 # 30 Days (2592000000 ms)
    refresh-expiration-ms: 604800000 # 7 Days

razorpay:
  key-id: ${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}
  enabled: ${RAZORPAY_ENABLED:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://inviteque.com,https://www.inviteque.com,https://www.invitique.com,https://inviteque-landing.vercel.app}

logging:
  level:
    org.springframework.security: INFO
    com.invitique: DEBUG
